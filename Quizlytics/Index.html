<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Interface with Create Quiz Button</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> <!-- Material Icons -->
  <style>
    /* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #dec0f1;
    }

    /* Navbar container */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ff9e00;
      padding: 7px 20px;
      color: white;
    }

    /* Logo or Brand */
    .navbar .brand {
      font-size: 24px;
      text-decoration: none;
      color: white;
    }
    .navbar .brand img {
      width: 190px;
      height: 70px;
    }

    /* Navbar links */
    .navbar-links {
      list-style: none;
      display: flex;
      justify-content: center;
    }

    .navbar-links li {
      margin: 0 20px;
    }

    .navbar-links a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .navbar-links a:hover {
      color: #7b2cbf;
    }

    /* Profile icon */
    .profile-icon {
      font-size: 24px;
      color: white;
      cursor: pointer;
    }

    /* Hamburger Menu for small screens */
    .hamburger {
      display: none;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    /* Media Query for small screens */
    @media (max-width: 768px) {
      .navbar-links {
        display: none;
        flex-direction: column;
        width: 100%;
        text-align: center;
        margin-top: 10px;
      }

      .navbar-links li {
        margin: 10px 0;
      }

      .navbar-links.active {
        display: flex;
      }

      .hamburger {
        display: block;
      }

      .navbar {
        justify-content: space-between;
      }

      .profile-icon {
        display: none;
      }
    }

    /* Styling for the name and designation section */
    .profile-details {
      padding: 20px;
      color: black;
      font-size: 20px;
      margin-top: 50px;
    }

    .profile-details .name {
      text-align: left;
      font-size: 40px;
      font-weight: bold;
    }

    .profile-details .designation {
      text-align: left;
      font-size: 25px;
      color: #7b2cbf;
    }

    /* Styling for the buttons */
    .button-container {
      display: flex;
      justify-content: space-between;
      margin: 20px;
    }

    .subject-buttons {
      display: flex;
      gap: 10px;
    }

    .subject-button {
      padding: 10px 20px;
      background-color: #7b2cbf;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .subject-button:hover {
      background-color: #5a1d8e;
    }

    .create-quiz-button {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background-color: #7b2cbf;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .create-quiz-button .material-icons {
      margin-left: 8px;
    }

    .create-quiz-button:hover {
      background-color: #e07b00;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="#" class="brand">
      <img src="Images/Screenshot_from_2025-01-29_15-15-02-removebg-preview.png" alt="Brand Logo">
    </a>
    <ul class="navbar-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Report</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <span class="profile-icon material-icons">account_circle</span>
    <span class="hamburger" onclick="toggleMenu()">&#9776;</span>
  </div>

  <!-- Profile Details Section -->
  <div class="profile-details">
    <div class="name">Tr. Monika Fernandis</div>
    <div class="designation">Assistant Professor</div>
  </div>

  <!-- Buttons Section -->
  
    <!-- Create Quiz Button -->
    <button class="create-quiz-button" onclick="window.location.href='quiz.html';">
      Create Quiz
      <span class="material-icons">add</span>
    </button>
  </div>

  <script>
    // Function to toggle the navigation menu on small screens
    function toggleMenu() {
      const navbarLinks = document.querySelector('.navbar-links');
      navbarLinks.classList.toggle('active');
    }
  </script>

</body>
</html>
